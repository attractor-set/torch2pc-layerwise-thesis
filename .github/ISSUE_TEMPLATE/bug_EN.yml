name: Bug report [EN]
description: Report a code or environment defect
title: "BUG: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment manifest and configuration
    validations:
      required: true
