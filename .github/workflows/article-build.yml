name: Сборка статьи

on:
  push:
    paths:
      - "article/**"
      - "references/bibliography.bib"
      - "results/tables/**"
      - ".github/workflows/article-build.yml"
  pull_request:
    paths:
      - "article/**"
      - "references/bibliography.bib"
      - "results/tables/**"

permissions:
  contents: read

jobs:
  latex:
    name: Англоязычная рукопись
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk biber texlive-latex-base texlive-latex-extra \
            texlive-fonts-recommended
      - run: cd article && latexmk -pdf -interaction=nonstopmode manuscript_EN.tex
      - uses: actions/upload-artifact@v4
        with:
          name: article-manuscript-en
          path: article/manuscript_EN.pdf
