name: Проверка качества

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Код, тесты и языковая структура
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt
            requirements/lock-dev.txt
            requirements/torch-cpu.txt
      - name: Установка зафиксированных зависимостей
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/torch-cpu.txt
          python -m pip install -r requirements/dev.txt
          python -m pip check
      - name: Ruff
        run: python -m ruff check src tests scripts/*.py
      - name: Mypy
        run: python -m mypy src
      - name: Pytest
        run: python -m pytest -q
      - name: Эпистемическая нейтральность
        run: python scripts/check_epistemic_language.py
      - name: Языковая структура
        run: python scripts/check_language_structure.py
      - name: Употребление терминов глоссария
        run: python scripts/check_glossary_usage.py
      - name: Локальные ссылки
        run: python scripts/check_local_links.py
      - name: Проверка репозитория
        run: bash scripts/validate_repository.sh
      - name: Проверка CITATION.cff в изолированной среде
        run: |
          python -m venv /tmp/cff-venv
          /tmp/cff-venv/bin/python -m pip install "cffconvert>=2.0,<3"
          /tmp/cff-venv/bin/cffconvert --validate
