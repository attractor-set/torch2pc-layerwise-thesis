name: Пакет релиза

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Сборка воспроизводимого архива
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: bash scripts/build_release.sh
      - uses: actions/upload-artifact@v7
        with:
          name: research-release
          path: artifacts/
