name: Stage 3B matched evidence draft release

on:
  push:
    tags:
      - "stage3b-matched-profiling-evidence-v1"

permissions:
  contents: write

jobs:
  draft-release:
    name: Validate evidence and create draft release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt
            requirements/lock-dev.txt
            requirements/torch-cpu.txt
      - name: Install pinned validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/torch-cpu.txt
          python -m pip install -r requirements/dev.txt
          python -m pip check
      - name: Validate sealed evidence and release contract
        run: |
          python -m pytest -q \
            tests/unit/test_stage3b_matched_profiling_evidence.py \
            tests/unit/test_stage3b_matched_release_packaging.py
      - name: Build repository-side draft assets
        env:
          PYTHONPATH: src
        run: |
          python scripts/package_stage3b_matched_release.py \
            --project-root . \
            --output-root artifacts/stage3b-matched-profiling-evidence-v1 \
            --tag "$GITHUB_REF_NAME" \
            --mode repository \
            --release-commit "$GITHUB_SHA"
          cd artifacts/stage3b-matched-profiling-evidence-v1
          sha256sum -c SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: stage3b-matched-profiling-evidence-v1
          path: artifacts/stage3b-matched-profiling-evidence-v1/
      - name: Create or refresh draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_DIR="artifacts/stage3b-matched-profiling-evidence-v1"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET_DIR"/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "$ASSET_DIR"/* \
              --draft \
              --verify-tag \
              --title "Stage 3B matched-profiling evidence v1" \
              --notes-file "$ASSET_DIR/RELEASE-NOTES.md"
          fi
