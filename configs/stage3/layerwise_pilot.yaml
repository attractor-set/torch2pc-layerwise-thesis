schema_version: 1
campaign: stage3-layerwise-diagnostics-pilot
policy:
  validation_only: true
  optimizer_step: false
  timing_separate: true

same_state:
  validation_batches: 5
  methods:
    - name: bp
      eta: null
      inference_steps: null
    - name: exact
      eta: 0.1
      inference_steps: 20
    - name: fixedpred
      eta: 0.1
      inference_steps: 10
    - name: strict
      eta: 0.05
      inference_steps: 20
  exact_control:
    min_cosine: 0.999
    max_relative_l2: 0.001

representations:
  reference_label: bp
  validation_samples: 1000
  layer_names:
    - "0"
    - "1"
    - "3"
    - "4"
    - "5"
  compute_rsa: true
  compute_cross_layer_cka: true
