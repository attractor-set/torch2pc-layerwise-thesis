site_name: Torch2PC Layer-wise Thesis
site_description: Воспроизводимый репозиторий магистерской диссертации и научной публикации
site_dir: site_ru
theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
nav:
  - Главная: index.md
  - Глоссарий: glossary.md
  - Исследование:
      - Исследовательский вопрос: research-question.md
      - Методология: methodology.md
      - План анализа: analysis-plan.md
      - Экспериментальный протокол: experiment-protocol.md
      - Угрозы валидности: threats-to-validity.md
      - Воспроизводимость: reproducibility.md
      - Управление данными: data-management.md
      - Оборудование: hardware.md
      - План публикации: publication-plan.md
      - Протокол Stage 2: stage-2-protocol.md
      - Протокол Stage 3: stage-3-protocol.md
      - Готовность Stage 3: stage-3-readiness.md
      - Результаты Stage 3A: stage3a-statistical-results.md
      - Stage 3B B0 validation и sealing: stage3b-b0-sealing.md
      - Stage 3B B0 analysis pipeline: stage3b-b0-analysis-pipeline.md
      - План магистерской диссертации: masters-thesis-plan.md
      - PC-TREF Balanced Core: pc-tref-balanced-core.md
      - PC-CATM: pc-catm-operator-model.md
      - Основной сценарий A: stage3b-primary-scenario-a.md
      - Эквивалентность Torch2PC patched-v1: torch2pc-patched-v1-equivalence.md
      - Настройка GitHub: github-setup.md
  - Дизайн:
      - Общий дизайн: research-design/design.md
      - Вычислительная среда: research-design/controlled-compute.md
      - Контрольный список: research-design/run-checklist.md
      - План статьи: research-design/article-plan.md
  - Решения:
      - Индекс ADR: decisions/index.md
      - ADR-001 Torch2PC: decisions/ADR-001-use-torch2pc.md
      - ADR-002 ROCm Docker: decisions/ADR-002-use-rocm-docker.md
      - ADR-003 Основная метрика: decisions/ADR-003-primary-metric.md
      - ADR-004 Статистика: decisions/ADR-004-statistical-protocol.md
      - ADR-006 Scope Stage 3: decisions/ADR-006-stage3-scope.md
      - ADR-007 Таксономия локальности: decisions/ADR-007-stage3-locality-taxonomy.md
      - ADR-008 Predict-correct acceleration: decisions/ADR-008-predict-correct-acceleration.md
      - ADR-012 Основной сценарий A: decisions/ADR-012-pc-tref-pc-catm-scenario-a.md
  - Журнал исследования:
      - Июль 2026: research-log/2026-07.md
      - Шаблон: research-log/template.md
  - English:
      - English documentation build: index_EN.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist
